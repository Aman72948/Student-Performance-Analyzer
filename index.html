<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>
</head>
<body>

<h2>Student Performance Predictor</h2>

<form id="form">

<input type="number" id="Hours_Studied" placeholder="Hours Studied">
<input type="number" id="Attendance" placeholder="Attendance">
<input type="number" id="Sleep_Hours" placeholder="Sleep Hours">
<input type="number" id="Previous_Scores" placeholder="Previous Scores">

<select id="Motivation_Level">
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>

<button type="submit">Predict</button>

</form>

<h3 id="result"></h3>

<script src="script.js"></script>

</body>
</html>
